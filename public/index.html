<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
</head>
<body>
    <h1>Chatting</h1>
    <!-- <input type="text" id="username" placeholder="Enter username"/> -->
    <br><br>

    <!-- <button onclick="createConnection()">Create WS Connection</button> -->
     <input type="text" id="message" placeholder="Enter message"/>
    <button id="sendBtn">SEND</button>

    <div id="messages"></div>
    <p id="typing"></p>

    <script src="/socket.io/socket.io.js"></script> 
    <script>
        // function createConnection(){
        //     const socket=io();
        // }
        const socket=io(); //connect browser to server

        const username=prompt("Enter your username");
        socket.emit("user-joined",username);//send user-joined event to server

        const sendBtn=document.getElementById("sendBtn");
        const messageInput=document.getElementById("message");
        // const usernameInput=document.getElementById("username");

        const allMessages = document.getElementById("messages");
        const typingIndicator=document.getElementById("typing");
        //listen for mssags from server
        // socket.on("message",message=>console.log(message));//console any message from server

        socket.on("message",(data)=>{ //broadcasting
            const p=document.createElement("p");
            p.innerText = `${data.username}: ${data.message}`; //extract username and messsage from data sent by server
            allMessages.appendChild(p);
        });

        socket.on("typing",(username)=>{
            // console.log("typing received from",username);
            typingIndicator.innerText = `${username} is typing...`;

            // setTimeout(()=>{
            //     typingIndicator.innerText="";
            // },1000);
        });

        sendBtn.addEventListener("click",()=>{
            const message=messageInput.value;
            console.log(message);
            // const username=usernameInput.value;
            // console.log(username);

            // socket.emit("user-message",message);  
            socket.emit("user-message",{
                username,
                message
            });
            messageInput.value="";
            typingIndicator.innerText="";//clear when messsage sent
        });

        messageInput.addEventListener("input",()=>{ //send typing event
            // console.log("typing event sent");
            socket.emit("typing",username);
            
        });

    </script>
</body>
</html>
