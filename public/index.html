<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
    #chat-container{
        height:300px;
        width:400px;
        border:1px solid black;
        overflow-y:auto;
        padding:10px;
    }
    </style>
</head>
<body>
    <h1>Chatting</h1>
    <!-- <input type="text" id="username" placeholder="Enter username"/> -->
    <br><br>

    <!-- <button onclick="createConnection()">Create WS Connection</button> -->
    <!-- <input type="text" id="room" placeholder="Enter Room Name"/> -->
     <input type="text" id="message" placeholder="Enter message"/>
    <button id="sendBtn">SEND</button>

    <div id="chat-container">
        <div id="messages"></div>
    </div>
    
    <h3>Users in Room</h3>
    <ul id="users"></ul>

    <p id="typing"></p>

    <script src="/socket.io/socket.io.js"></script> 
    <script>
        // function createConnection(){
        //     const socket=io();
        // }
        const socket=io(); //connect browser to server

        const username=prompt("Enter your username");
        // socket.emit("user-joined",username);//send user-joined event to server
        const room=prompt("Enter Room");
        //send join-room event to server with username and room
        socket.emit("join-room",{
            username,
            room
        });

        const sendBtn=document.getElementById("sendBtn");
        const messageInput=document.getElementById("message");
        // const usernameInput=document.getElementById("username");

        const allMessages = document.getElementById("messages");
        const typingIndicator=document.getElementById("typing");

        const userList=document.getElementById("users");
        //listen for mssags from server
        // socket.on("message",message=>console.log(message));//console any message from server

        socket.on("room-users",(users)=>{
            userList.innerHTML="";//clear ->rebuild to send fresh everytime
            //iterate thru each user in array (roomUsers) sent by server
            users.forEach(user=>{
                const li=document.createElement("li");//create new HTML element in memory
                li.innerText=user;//put username inside the list element
                userList.appendChild(li);//add to list of users
            })
        })

        socket.on("message",(data)=>{

            const p = document.createElement("p");

            if(data.id){
                p.dataset.id = data.id;
            }

            // <p data-id="12">
                // <span class="meta">user1 [03:42 PM]</span>
                // <span class="text">hello</span>
                // <span class="status">✓</span>
            // </p>

            const meta = document.createElement("span");
            meta.className = "meta";

            const text = document.createElement("span");
            text.className = "text";

            const status = document.createElement("span");
            status.className = "status";

            meta.innerText = `${data.username} [${data.time}]: `;
            text.innerText = data.message;

            // SYSTEM MESSAGE
            if(data.username === "System"){
                p.appendChild(meta);
                p.appendChild(text);
            }

            // MESSAGE SENT BY CURRENT USER
            else if(data.username === username){

                status.innerText = " ✓";

                p.appendChild(meta);
                p.appendChild(text);
                p.appendChild(status);
            }

            // MESSAGE RECEIVED FROM OTHERS
            else{

                p.appendChild(meta);
                p.appendChild(text);

                if(data.id){
                    socket.emit("message-delivered", data.id);
                    socket.emit("message-read", data.id);
                }
            }

            allMessages.appendChild(p);

            autoScroll();
        });

        socket.on("message-status-update",(data)=>{
            const msg = document.querySelector(`[data-id="${data.id}"]`);

            if(!msg) return;

            const status = msg.querySelector(".status");

            if(status){
                status.innerText = " ✓✓";
            }
        });

        socket.on("message-read-update",(data)=>{
            const msg = document.querySelector(`[data-id="${data.id}"]`);

            if(!msg) return;

            const status = msg.querySelector(".status");

            if(status){
                status.innerText = " ✓✓🔵";
            }
        });

        socket.on("message-edited",(data)=>{
            const msg = document.querySelector(`[data-id="${data.id}"]`);

            if(!msg) return;

            const text = msg.querySelector(".text");

            if(text){
                text.innerText = data.message + " (edited)";
            }
        });

        socket.on("message-deleted",(data)=>{
            const msg = document.querySelector(`[data-id="${data.id}"]`);

            if(!msg) return;

            const text = msg.querySelector(".text");
            const status = msg.querySelector(".status");

            if(text){
                text.innerText = "This message was deleted";
            }

            if(status){
                status.innerText = "";
            }
        })

        socket.on("typing",(username)=>{
            // console.log("typing received from",username);
            typingIndicator.innerText = `${username} is typing...`;

            // setTimeout(()=>{
            //     typingIndicator.innerText="";
            // },1000);
        });

        socket.on("stop-typing",(username)=>{
            typingIndicator.innerText="";
        });

        //listen for private messages=>{from,message,time}
        socket.on("private-message",(data)=>{
            const p=document.createElement("p");
            // p.innerText=`[DM] ${data.from} [${data.time}]: ${data.message}`; //extract from(username) time and mssg sent from server
            
            if(data.self){
                p.innerText = `[DM → ${data.from}] [${data.time}]: ${data.message}`;
            }else{
                p.innerText = `[DM] ${data.from} [${data.time}]: ${data.message}`;
            }
            
            allMessages.appendChild(p);
        });

        socket.on("chat-history",(messages)=>{

            allMessages.innerHTML="";//clear previous messages

            messages.forEach(msg =>{
                const p=document.createElement("p");
                p.dataset.id = msg.id;
                p.innerText = `${msg.username} [${msg.time}]: ${msg.message}`;
                allMessages.appendChild(p);
            });

            autoScroll();
        });

        let loadingOlderMessages=false;

        socket.on("older-messages",(messages)=>{
            messages.forEach(msg =>{
                const p=document.createElement("p");
                p.dataset.id = msg.id;
                p.innerText = `${msg.username} [${msg.time}]: ${msg.message}`;

                allMessages.prepend(p);//because older messages go above.
            });
            loadingOlderMessages=false;//reset when received
        });

        sendBtn.addEventListener("click",()=>{
            const message=messageInput.value;
            console.log(message);
            // const username=usernameInput.value;
            // console.log(username);

            // socket.emit("user-message",message);  

            //DM: @username message
            if(message.startsWith("@")){
                const parts=message.split(" ");//break mssg into array of words
                const to=parts[0].substring(1);//remove @ from parts[0]="@username"=> "username" (send TO this username)
                const dmMessage=parts.slice(1).join(" ");//returns everything after index 0(after @username). join(" ")=>merge array back into string
                
                if(dmMessage.length===0){
                    alert("Message cannot be Empty");
                    return;
                }

                socket.emit("private-message",{
                    to,
                    message:dmMessage,  
                    username
                });
            }
            //edit=> /edit 12(id) new-message-text
            else if(message.startsWith("/edit")){
                const parts=message.split(" ");
                const id=parts[1];//mssg id number to be edited
                const newMessage=parts.slice(2).join(" ");//join mssg after index 1=>
                
                socket.emit("edit-message",{
                    messageId:id,
                    newMessage
                });
            }
            //delete=> /delete 12(id)
            else if(message.startsWith("/delete")){
                const id=message.split(" ")[1];
                socket.emit("delete-message",id);
            }
            //normal chat
            else{
                socket.emit("user-message",{
                    username,
                    message
                });
            }
            messageInput.value="";
            // typingIndicator.innerText="";//clear when messsage sent
            socket.emit("stop-typing",username);
        });

        let typingTimeout;

        messageInput.addEventListener("input",()=>{ //send typing event
            // console.log("typing event sent");
            socket.emit("typing",username);

            clearTimeout(typingTimeout);

            typingTimeout=setTimeout(()=>{
                socket.emit("stop-typing",username);
            },3000);//stop when user doesnt type for 3 seconds
            
        });

        const chatContainer=document.getElementById("chat-container");

        chatContainer.addEventListener("scroll",()=>{
            //when scrolled all the way to the top->load older messages from db
            if(chatContainer.scrollTop===0 && !loadingOlderMessages){

                const firstMessage=allMessages.firstChild;
                if(!firstMessage)return;

                loadingOlderMessages=true;

                const messageId=firstMessage.dataset.id;
                
                socket.emit("load-older-messages",{
                    room,
                    lastMessageId: messageId
                });
            }
        });

        function autoScroll(){
            // const chatContainer=document.getElementById("chat-container");
            // scrollTop → current scroll position
            chatContainer.scrollTop=chatContainer.scrollHeight;//move the scroll to the maximum height.
        }

    </script>
</body>
</html>
