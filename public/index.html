<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
    #chat-container{
        height:300px;
        width:400px;
        border:1px solid black;
        overflow-y:auto;
        padding:10px;
    }
    </style>
</head>
<body>
    <h1>Chatting</h1>
    <!-- <input type="text" id="username" placeholder="Enter username"/> -->
    <br><br>

    <!-- <button onclick="createConnection()">Create WS Connection</button> -->
    <!-- <input type="text" id="room" placeholder="Enter Room Name"/> -->
     <input type="text" id="message" placeholder="Enter message"/>
    <button id="sendBtn">SEND</button>

    <div id="chat-container">
        <div id="messages"></div>
    </div>
    
    <h3>Users in Room</h3>
    <ul id="users"></ul>

    <p id="typing"></p>

    <script src="/socket.io/socket.io.js"></script> 
    <script>
        // function createConnection(){
        //     const socket=io();
        // }
        const socket=io(); //connect browser to server

        const username=prompt("Enter your username");
        // socket.emit("user-joined",username);//send user-joined event to server
        const room=prompt("Enter Room");
        //send join-room event to server with username and room
        socket.emit("join-room",{
            username,
            room
        });

        const sendBtn=document.getElementById("sendBtn");
        const messageInput=document.getElementById("message");
        // const usernameInput=document.getElementById("username");

        const allMessages = document.getElementById("messages");
        const typingIndicator=document.getElementById("typing");

        const userList=document.getElementById("users");
        //listen for mssags from server
        // socket.on("message",message=>console.log(message));//console any message from server

        socket.on("room-users",(users)=>{
            userList.innerHTML="";//clear ->rebuild to send fresh everytime
            //iterate thru each user in array (roomUsers) sent by server
            users.forEach(user=>{
                const li=document.createElement("li");//create new HTML element in memory
                li.innerText=user;//put username inside the list element
                userList.appendChild(li);//add to list of users
            })
        })

        socket.on("message",(data)=>{ //broadcasting
            const p=document.createElement("p");
            p.innerText = `${data.username} [${data.time}]: ${data.message}`; //extract username ,time and messsage from data sent by server and attach
            allMessages.appendChild(p);//add to the message

            autoScroll();
        });

        socket.on("typing",(username)=>{
            // console.log("typing received from",username);
            typingIndicator.innerText = `${username} is typing...`;

            // setTimeout(()=>{
            //     typingIndicator.innerText="";
            // },1000);
        });

        socket.on("stop-typing",(username)=>{
            typingIndicator.innerText="";
        });

        //listen for private messages=>{from,message,time}
        socket.on("private-message",(data)=>{
            const p=document.createElement("p");
            // p.innerText=`[DM] ${data.from} [${data.time}]: ${data.message}`; //extract from(username) time and mssg sent from server
            
            if(data.self){
                p.innerText = `[DM → ${data.from}] [${data.time}]: ${data.message}`;
            }else{
                p.innerText = `[DM] ${data.from} [${data.time}]: ${data.message}`;
            }
            
            allMessages.appendChild(p);
        });

        socket.on("chat-history",(messages)=>{

            allMessages.innerHTML="";//clear previous messages

            messages.forEach(msg =>{
                const p=document.createElement("p");
                p.innerText=`${msg.username} [${msg.time}]: ${msg.message}`;
                allMessages.appendChild(p);
            });

            autoScroll();
        });

        sendBtn.addEventListener("click",()=>{
            const message=messageInput.value;
            console.log(message);
            // const username=usernameInput.value;
            // console.log(username);

            // socket.emit("user-message",message);  

            //DM: @username message
            if(message.startsWith("@")){
                const parts=message.split(" ");//break mssg into array of words
                const to=parts[0].substring(1);//remove @ from parts[0]="@username"=> "username" (send TO this username)
                const dmMessage=parts.slice(1).join(" ");//returns everything after index 0(after @username). join(" ")=>merge array back into string
                
                if(dmMessage.length===0){
                    alert("Message cannot be Empty");
                    return;
                }

                socket.emit("private-message",{
                    to,
                    message:dmMessage,  
                    username
                });
            }
            else{
                socket.emit("user-message",{
                    username,
                    message
                });
            }
            messageInput.value="";
            // typingIndicator.innerText="";//clear when messsage sent
            socket.emit("stop-typing",username);
        });

        let typingTimeout;

        messageInput.addEventListener("input",()=>{ //send typing event
            // console.log("typing event sent");
            socket.emit("typing",username);

            clearTimeout(typingTimeout);

            typingTimeout=setTimeout(()=>{
                socket.emit("stop-typing",username);
            },3000);//stop when user doesnt type for 3 seconds
            
        });

        function autoScroll(){
            const chatContainer=document.getElementById("chat-container");
            // scrollTop → current scroll position
            chatContainer.scrollTop=chatContainer.scrollHeight;//move the scroll to the maximum height.
        }

    </script>
</body>
</html>
